      .nav-list { display: grid; gap: 4px; }

ices you choose. We ask only for what is needed for that purpose. You may leave optional fields blank, and you can ask us to correct or delete your data at any time."}, {"row": 43, "text": "How we protect it: your information is accessed only by your advisory team, kept confidential, stored securely, and never sold or shared with third parties for marketing. Sensitive identifiers (such as PAN and the last 4 digits of Aadhaar) and any documents you upload are handled with the highest level of care and used solely for your plan and statutory/KYC purposes where applicable."}, {"row": 44, "text": "Your rights: you can withdraw your consent, request access to the data we hold about you, ask us to correct inaccuracies, or ask us to delete your data, by contacting us. Withdrawing consent may limit the services we can provide. We retain your data only as long as needed for your plan and any legal/regulatory requirements."}, {"row": 45, "text": "I have read the above and I consent to DocWealth collecting and processing my information for the purposes described.  *"}, {"row": 46, "text": "Full name (as confirmation of consent): | Date:"}], "video": {"placement": "welcome", "status": "coming_soon", "sourceRows": [{"row": 15, "text": "â€¢  Watch the short Overview Video at the end of this welcome note before you begin."}, {"row": 35, "text": "â–¶  Overview Video â€” please watch before you begin"}, {"row": 36, "text": "A short walkthrough of how this workbook builds your personalised plan. When this workbook is published as a client form, the video plays right here at the end of this welcome note â€” there is no separate video tab."}, {"row": 37, "text": "â–¶   VIDEO"}, {"row": 38, "text": "YouTube link:"}, {"row": 39, "text": "Paste the YouTube link in the cell above and we will embed it here when the form is published."}]}, "consent": {"label": "I have read the above and I consent to DocWealth collecting and processing my information for the purposes described.  *", "nameLabe     <script>
      const WORKBOOK_SCHEMA = JSON.parse(document.getElementById("workbook-schema").textContent);
      const PORTAL_PARAMS = new URLSearchParams(window.location.search);
      const PORTAL_CLIENT_ID = PORTAL_PARAMS.get("clientId") || "";
      const PORTAL_TOKEN = PORTAL_PARAMS.get("token") || "";
      const STORAGE_KEY = "docwealth_single_file_portal_draft_v2_fixed_" + (PORTAL_CLIENT_ID || "default");
      const SERVICE_IDS = ["work_contract_analysis", "career_mentoring", "tax_audit_services", "clinic_financial_analysis", "doctor_compensation_tool"];
      const MAX_UPLOAD_SIZE = 20 * 1024 * 1024;
      const ALLOWED_UPLOAD_TYPES = ["pdf", "jpg", "jpeg", "png", "webp", "doc", "docx", "xls", "xlsx", "csv"];
      const VIDEO_ICON_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M8 5v14l11-7z"></path></svg>';
      const app = document.getElementById("app");
      let state;
      let errors = {};
      let saveTimer = null;
      let hasUnsavedChanges = false;
      let toastTimer = null;
      let keyboardMoving = false;

      function makeId() {
        return crypto && crypto.randomUUID ? crypto.randomUUID() : "draft-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function emptyValue(field) {
        if (field.type === "file") return { files: [], password: "" };
        return field.defaultValue || "";
      }

      function isGoalsSection(section) {
        return section && section.id === "goals";
      }

      function uniquePlans(plans) {
        return Array.from(new Set((plans || []).map((plan) => String(plan || "").trim()).filter(Boolean)));
      }

      function planFromLegacyRow(row) {
        return (row && (row.planning_area || row.specific_goal || row.goal_category)) || "";
      }

      function normalizeGoalsValue(section, value) {
        const rows = Array.isArray(value && value.rows) ? value.rows : [];
        const migratedPlans = Array.isArray(value && value.selectedPlans)
          ? value.selectedPlans
          : Array.isArray(value && value.quickSelectedGoals)
            ? value.quickSelectedGoals
            : [];
        const normalizedRows = rows.map((row, index) => ({
          ...row,
          planning_areas: uniquePlans([].concat(planningAreasFromRow(row), index === 0 ? migratedPlans : [])),
          ...hiddenGoalFieldsForPlans(uniquePlans([].concat(planningAreasFromRow(row), index === 0 ? migratedPlans : [])))
        }));
        if (!normalizedRows.length) normalizedRows.push(emptyGoalRow(section, uniquePlans(migratedPlans)));
        return { ...(value || {}), rows: normalizedRows };
      }

      function emptyGoalRow(section, planningAreas) {
        return { ...Object.fromEntries((section.fields || []).map((field) => [field.key, emptyValue(field)])), planning_areas: planningAreas || [], ...hiddenGoalFieldsForPlans(planningAreas || []) };
      }

      function planningAreasFromRow(row) {
        if (Array.isArray(row && row.planning_areas)) return uniquePlans(row.planning_areas);
        if (typeof (row && row.planning_areas) === "string") return uniquePlans(row.planning_areas.split(","));
        const legacy = planFromLegacyRow(row);
        return legacy ? [legacy] : [];
      }

      const QUICK_GOAL_GROUPS = [
        { title: "Primary Planning Goals", options: ["Retirement Planner", "Child Education Goal", "School Fee Goal", "Marriage Financial Plan", "Vacation Goal Planner", "Emergency Fund", "FIRE / FI Readiness", "Car Goal", "Real Estate Buying Goal", "Short-Term Goals", "Life Insurance", "Health Insurance", "Professional Indemnity", "Risk and Financial Awareness", "Net Worth Statement", "Cashflow Summary", "Financial Ratios", "Personality Questionnaire"] },
        { title: "Specialized Planning Goals", options: ["Clinic Setup / Purchase", "Fellowship / Study Goal", "Clinic Breakeven Plan", "Minimum Guarantee + Incentive", "Compensation Revenue Share", "Compensation Outsourced", "Compensation Equity Partnership", "Real Estate Investment Break-even", "House Rent vs Own", "Home Loan Amortization & Prepayment", "Real Estate vs Other Investments", "Car Lease vs Own", "Home Expenses Plan", "Generic Products & Lifestyle Goals", "Parental Care Fund", "Special Care Fund", "Philanthropy Fund", "Tax Optimizer Old vs New"] }
      ];

      const PLANNING_AREA_MAP = {
        "Retirement Planner": { category: "Core Life", specific: "Retirement" },
        "Child Education Goal": { category: "Child-Centric", specific: "Children's Higher Education" },
        "School Fee Goal": { category: "Child-Centric", specific: "Children's Schooling" },
        "Marriage Financial Plan": { category: "Child-Centric", specific: "Child Marriage" },
        "Vacation Goal Planner": { category: "Core Life", specific: "Vacation" },
        "Emergency Fund": { category: "Core Life", specific: "Emergency Fund" },
        "FIRE / FI Readiness": { category: "Core Life", specific: "FIRE (Early Retirement)" },
        "Car Goal": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Real Estate Buying Goal": { category: "Core Life", specific: "Home Purchase" },
        "Short-Term Goals": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Life Insurance": { category: "Legacy & Protection", specific: "Estate/Premium Vault" },
        "Health Insurance": { category: "Legacy & Protection", specific: "Estate/Premium Vault" },
        "Professional Indemnity": { category: "Legacy & Protection", specific: "Medico-legal / Litigation Reserve" },
        "Risk and Financial Awareness": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Net Worth Statement": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Cashflow Summary": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Financial Ratios": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Personality Questionnaire": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Clinic Setup / Purchase": { category: "Practice & Career", specific: "Clinic Setup / Expansion" },
        "Fellowship / Study Goal": { category: "Practice & Career", specific: "Fellowship" },
        "Clinic Breakeven Plan": { category: "Practice & Career", specific: "Other (specify)" },
        "Minimum Guarantee + Incentive": { category: "Practice & Career", specific: "Other (specify)" },
        "Compensation Revenue Share": { category: "Practice & Career", specific: "Other (specify)" },
        "Compensation Outsourced": { category: "Practice & Career", specific: "Other (specify)" },
        "Compensation Equity Partnership": { category: "Practice & Career", specific: "Partner Buy-in" },
        "Real Estate Investment Break-even": { category: "Legacy & Protection", specific: "Other (specify)" },
        "House Rent vs Own": { category: "Core Life", specific: "Home Purchase" },
        "Home Loan Amortization & Prepayment": { category: "Core Life", specific: "Home Purchase" },
        "Real Estate vs Other Investments": { category: "Legacy & Protection", specific: "Other (specify)" },
        "Car Lease vs Own": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Home Expenses Plan": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Generic Products & Lifestyle Goals": { category: "Lifestyle & Events", specific: "Other (specify)" },
        "Parental Care Fund": { category: "Family & Elder Care", specific: "Parental Care Fund" },
        "Special Care Fund": { category: "Family & Elder Care", specific: "Special-Needs Fund" },
        "Philanthropy Fund": { category: "Legacy & Protection", specific: "Philanthropy Fund" },
        "Tax Optimizer Old vs New": { category: "Legacy & Protection", specific: "Other (specify)" }
      };

      function hiddenGoalFieldsForPlans(plans) {
        const mapped = PLANNING_AREA_MAP[(plans || [])[0] || ""];
        return mapped ? { goal_category: mapped.category, specific_goal: mapped.specific } : {};
      }

      function createSectionState(section) {
        if (section.kind === "welcome") return { consent: "", confirmationName: "", confirmationDate: "" };
        if (isGoalsSection(section)) return { rows: [emptyGoalRow(section)] };
        if (section.kind === "table") {
          return { rows: [Object.fromEntries((section.fields || []).map((field) => [field.key, emptyValue(field)]))] };
        }
        if (section.kind === "matrix") {
          return {
            columns: Object.fromEntries((section.columns || []).map((column) => [
              column.key,
              Object.fromEntries((section.fields || []).filter((field) => field.type !== "heading").map((field) => [field.key, emptyValue(field)]))
            ]))
          };
        }
        if (section.kind === "additional_services") return {};
        return Object.fromEntries((section.fields || []).filter((field) => field.type !== "heading").map((field) => [field.key, emptyValue(field)]));
      }

      function initialState() {
        return {
          draftId: makeId(),
          clientId: PORTAL_CLIENT_ID,
          portalToken: PORTAL_TOKEN,
          started: false,
          currentSectionId: WORKBOOK_SCHEMA.sections[0].id,
          completed: [],
          sections: Object.fromEntries(WORKBOOK_SCHEMA.sections.map((section) => [section.id, createSectionState(section)])),
          selectedServices: {},
          wantsAdditional: "",
          declarationConfirmed: false,
          submittedAt: "",
          confirmationNumber: "",
          lastSavedAt: ""
        };
      }

      function loadState() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return initialState();
          return Object.assign(initialState(), JSON.parse(saved));
        } catch {
          return initialState();
        }
      }

      function startupState() {
        const saved = loadState();
        return saved.submittedAt ? saved : initialState();
      }

      function hasSavedDraft() {
        const saved = loadState();
        return Boolean(saved.started && !saved.submittedAt);
      }

      function saveNow() {
        state.lastSavedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        hasUnsavedChanges = false;
        renderHeaderOnly();
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        document.querySelectorAll(".toast").forEach((item) => item.remove());
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        document.body.appendChild(toast);
        toastTimer = setTimeout(() => toast.remove(), 1800);
      }

      function queueSave() {
        hasUnsavedChanges = true;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveNow, 600);
      }

      function formatDate(value) {
        if (!value) return "Not saved yet";
        return new Intl.DateTimeFormat("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", hour12: false }).format(new Date(value));
      }

      function visibleSections() {
        const base = WORKBOOK_SCHEMA.sections.filter((section) => !SERVICE_IDS.includes(section.id));
        if (state.wantsAdditional !== "Yes") return base;
        const selected = WORKBOOK_SCHEMA.sections.filter((section) => SERVICE_IDS.includes(section.id) && state.selectedServices[section.id]);
        return base.concat(selected);
      }

      function hasMeaningfulValue(value) {
        if (value == null || value === "") return false;
        if (typeof value === "object" && "files" in value) return Boolean((value.files || []).length || value.password);
        if (Array.isArray(value)) return value.some(hasMeaningfulValue);
        if (typeof value === "object") return Object.values(value).some(hasMeaningfulValue);
        return String(value).trim().length > 0;
      }

      function reviewSections() {
        const core = WORKBOOK_SCHEMA.sections.filter((section) => !SERVICE_IDS.includes(section.id) && section.id !== "additional_services");
        if (state.wantsAdditional !== "Yes") return core;
        const selectedServiceSections = WORKBOOK_SCHEMA.sections.filter((section) => SERVICE_IDS.includes(section.id) && state.selectedServices[section.id] && hasMeaningfulValue(state.sections[section.id]));
        const gateway = WORKBOOK_SCHEMA.sections.filter((section) => section.id === "additional_services");
        return core.concat(gateway, selectedServiceSections);
      }

      function currentSection() {
        return visibleSections().find((section) => section.id === state.currentSectionId) || visibleSections()[0];
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }

      function scrollToTop() {
        requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "smooth" }));
      }

      function focusFirstError() {
        requestAnimationFrame(() => {
          const first = document.querySelector(".invalid-field, [data-error='true']");
          if (first) {
            first.scrollIntoView({ behavior: "smooth", block: "center" });
            if (typeof first.focus === "function") first.focus({ preventScroll: true });
          }
        });
      }

      function orderedFieldControls() {
        const fields = Array.from(document.querySelectorAll("[data-path], [data-upload-password]"))
          .filter((item) => !item.disabled && item.offsetParent !== null);
        return fields.sort((a, b) => {
          const ar = a.getBoundingClientRect();
          const br = b.getBoundingClientRect();
          if (Math.abs(ar.top - br.top) > 8) return ar.top - br.top;
          return ar.left - br.left;
        });
      }

      function nextLogicalFieldIndex(current) {
        const fields = orderedFieldControls();
        const index = fields.indexOf(current);
        return index >= 0 && fields[index + 1] ? index + 1 : -1;
      }

      function focusLogicalFieldAtIndex(index) {
        if (index < 0) {
          completeAndNext();
          return;
        }
        const target = orderedFieldControls()[index];
        if (!target) {
          completeAndNext();
          return;
        }
        target.focus();
        if (typeof target.scrollIntoView === "function") target.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      function rowStarted(row) {
        return Object.values(row).some((value) => {
          if (!value) return false;
          if (typeof value === "object" && "files" in value) return value.files.length || value.password;
          return String(value).trim();
        });
      }

      function getFamilyMembers() {
        const family = state.sections.family_profile;
        return ((family && family.rows) || []).map((row) => row.full_name).filter(Boolean);
      }

      function getAssets() {
        const assets = state.sections.assets_investments;
        return ((assets && assets.rows) || [])
          .map((row) => row.instrument_identifier_name_isin_folio || row.product_sub_category || row.asset_class)
          .filter(Boolean);
      }

      function getFieldOptions(field, context) {
        if (!field) return [];
        if (field.dynamicOptions === "familyMembers") return getFamilyMembers();
        if (field.dynamicOptions === "coBorrowers") return getFamilyMembers().concat(["Another third party"]);
        if (field.dynamicOptions === "assets") return getAssets();
        if (field.dependentOptions === "listsByCurrentRow" && context) {
          const candidates = [
            context.category,
            context.sub_category,
            context.asset_class,
            context.product_sub_category,
            context.loan_category,
            context.loan_sub_type,
            context.goal_category
          ].filter(Boolean);
          for (const candidate of candidates) {
            if (WORKBOOK_SCHEMA.lists[candidate]) return WORKBOOK_SCHEMA.lists[candidate];
            if (WORKBOOK_SCHEMA.lists["L_" + candidate]) return WORKBOOK_SCHEMA.lists["L_" + candidate];
          }
        }
        return field.options || [];
      }

      function isDateField(field) {
        return field && field.type === "date";
      }

      function isDobField(field) {
        const text = ((field && (field.label + " " + field.key)) || "").toLowerCase();
        return text.includes("date of birth") || text.includes("dob");
      }

      function isFutureAllowedDate(field) {
        const text = ((field && field.label) || "").toLowerCase();
        return /maturity|target|end|renewal|until|future|expiry|retirement/.test(text);
      }

      function ageFromDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return null;
        const today = new Date();
        let age = today.getFullYear() - date.getFullYear();
        const monthDelta = today.getMonth() - date.getMonth();
        if (monthDelta < 0 || (monthDelta === 0 && today.getDate() < date.getDate())) age -= 1;
        return age;
      }

      function normalizePhone(value) {
        const raw = String(value || "").trim();
        if (raw.startsWith("+")) return "+" + raw.slice(1).replace(/\D/g, "").slice(0, 15);
        const digits = raw.replace(/\D/g, "");
        if (digits.length === 12 && digits.startsWith("91")) return "+" + digits;
        return digits.slice(0, 15);
      }

      function normalizeInputValue(field, value) {
        let next = String(value == null ? "" : value);
        if (!field) return next;
        if (field.type === "email") return next.toLowerCase().replace(/\s/g, "");
        if (field.type === "tel") return normalizePhone(next);
        if (field.type === "number") {
          next = next.replace(/[^0-9.\-]/g, "");
          const minus = next.startsWith("-") ? "-" : "";
          next = minus + next.replace(/-/g, "");
          const parts = next.split(".");
          return parts.length > 1 ? parts[0] + "." + parts.slice(1).join("") : next;
        }
        if ((field.key || "").toLowerCase() === "pan") return next.toUpperCase().replace(/\s/g, "");
        return next;
      }

      function fieldApplicable(field, context) {
        if (!field) return true;
        const key = field.key || "";
        const label = (field.label || "").toLowerCase();
        if (key.includes("communication_address")) {
          const aadhaar = String(context && context.use_aadhaar_address_for_post_courier || "").toLowerCase();
          return aadhaar === "no";
        }
        if (label.includes("hospital name") && label.includes("only if")) {
          return /other|any other/.test(String(context && context.primary_hospital_institution || "").toLowerCase());
        }
        return true;
      }

      function fieldOptionalByInstruction(field) {
        const text = ((field && [field.label, field.helperText, field.group].filter(Boolean).join(" ")) || "").toLowerCase();
        return /leave blank if same|leave blank if|if applicable|not applicable|skip if|optional upload|complete if applicable|only if available|upload only if available/.test(text);
      }

      function fieldRequired(field) {
        return Boolean(field && field.required && !fieldOptionalByInstruction(field));
      }

      function familySelfMaritalStatus() {
        const rows = (state.sections.family_profile && state.sections.family_profile.rows) || [];
        const self = rows.find((row) => String(row.relationship || "").toLowerCase() === "self") || rows[0] || {};
        return String(self.marital_status || "").toLowerCase();
      }

      function familyHasSpouseOrSibling() {
        const rows = (state.sections.family_profile && state.sections.family_profile.rows) || [];
        const married = /married|domestic/.test(familySelfMaritalStatus());
        const sibling = rows.some((row) => /spouse|brother|sister/.test(String(row.relationship || "").toLowerCase()));
        return married || sibling;
      }

      function matrixColumnVisible(section, columnKey) {
        if (!section || section.id !== "doctor_practice") return true;
        if (columnKey === "doctor_2_spouse_other_doctor") return familyHasSpouseOrSibling();
        return true;
      }

      function matrixColumnCounts(section, columnKey) {
        if (section && section.id === "doctor_practice") return columnKey === "doctor_1_you";
        return true;
      }

      function doctorFirstName() {
        const rows = (state.sections.family_profile && state.sections.family_profile.rows) || [];
        const self = rows.find((row) => String(row.relationship || "").toLowerCase() === "self") || rows[0] || {};
        const name = String(self.full_name || "").trim();
        return name ? name.split(/\s+/)[0] : "";
      }

      function rowApplicable(section, row) {
        if (!section || !row) return true;
        if (section.id === "family_profile" && String(row.relationship || "").toLowerCase() === "spouse") {
          return /married|domestic/.test(familySelfMaritalStatus());
        }
        return true;
      }

      function completionForFields(fields, values) {
        const required = (fields || []).filter((field) => field.type !== "heading" && fieldApplicable(field, values || {}) && fieldRequired(field));
        if (!required.length) return hasMeaningfulValue(values) ? 1 : 0;
        const answered = required.filter((field) => hasMeaningfulValue(values && values[field.key])).length;
        return answered / required.length;
      }

      function sectionProgress(section) {
        const value = state.sections[section.id];
        if (!section) return 0;
        if (section.kind === "welcome") {
          const needed = [value.consent === "I Consent", hasMeaningfulValue(value.confirmationName)];
          return needed.filter(Boolean).length / needed.length;
        }
        if (section.kind === "additional_services") {
          if (!state.wantsAdditional) return 0;
          if (state.wantsAdditional === "No") return 1;
          return Object.values(state.selectedServices).some(Boolean) ? 1 : 0.5;
        }
        if (isGoalsSection(section)) {
          const rows = (normalizeGoalsValue(section, value).rows || []).filter((row, index) => index === 0 || rowStarted(row));
          if (!rows.length) return 0;
          return rows.reduce((sum, row) => {
            const visibleFields = (section.fields || []).filter((field) => !["goal_category", "specific_goal"].includes(field.key));
            const planningScore = (planningAreasFromRow(row).length || planFromLegacyRow(row)) ? 1 : 0;
            return sum + (completionForFields(visibleFields, row) + planningScore) / 2;
          }, 0) / rows.length;
        }
        if (section.kind === "table") {
          const rows = (value.rows || []).filter((row, index) => rowApplicable(section, row) && (index === 0 || rowStarted(row)));
          if (!rows.length) return 0;
          return rows.reduce((sum, row) => sum + completionForFields(section.fields, row), 0) / rows.length;
        }
        if (section.kind === "matrix") {
          const columns = (section.columns || []).filter((column) => matrixColumnCounts(section, column.key));
          if (!columns.length) return 0;
          return columns.reduce((sum, column) => sum + completionForFields(section.fields, (value.columns || {})[column.key] || {}), 0) / columns.length;
        }
        return completionForFields(section.fields, value || {});
      }

      function overallProgress() {
        const sections = visibleSections();
        if (!sections.length) return 0;
        return Math.round(sections.reduce((sum, section) => sum + sectionProgress(section), 0) / sections.length * 100);
      }

      function sectionStatus(section) {
        const progress = sectionProgress(section);
        if (progress >= 1) return { className: "done", mark: "&#10003;", label: "Completed" };
        if (progress > 0 || section.id === state.currentSectionId) return { className: "progressing", mark: "!", label: "In Progress" };
        return { className: "", mark: "", label: "Not Started" };
      }

      function findFieldByPath(path) {
        if (!path) return null;
        const parts = path.split(".");
        const section = WORKBOOK_SCHEMA.sections.find((item) => item.id === parts[0]);
        if (!section) return null;
        if (section.kind === "welcome") {
          if (parts[1] === "consent") return { key: "consent", type: "select" };
          if (parts[1] === "confirmationDate") return { key: "confirmationDate", type: "date" };
          return { key: parts[1], type: "text" };
        }
        if (section.kind === "table") return (section.fields || []).find((field) => field.key === parts[3]) || null;
        if (section.kind === "matrix") return (section.fields || []).find((field) => field.key === parts[3]) || null;
        return (section.fields || []).find((field) => field.key === parts[1]) || null;
      }

      function validateValue(field, value, context) {
        if (!field || field.type === "heading" || !fieldApplicable(field, context)) return "";
        if (fieldRequired(field)) {
          if (field.type === "file" && (!value || !value.files || !value.files.length)) return "Required upload";
          if (field.type !== "file" && !String(value || "").trim()) return "Required";
        }
        const text = String(value || "").trim();
        if (!text) return "";
        if (field.type === "email" && !/^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i.test(text)) return "Please enter a valid email address.";
        if (field.type === "tel") {
          if (text.startsWith("+")) {
            const digits = text.slice(1).replace(/\D/g, "");
            if (!/^\+\d{8,15}$/.test("+" + digits)) return "Enter a valid international number starting with + and 8-15 digits.";
          } else {
            const digits = text.replace(/\D/g, "");
            if (!/^[6-9]\d{9}$/.test(digits)) return "Enter a valid Indian 10-digit mobile number, or use + followed by 8-15 digits for international numbers.";
          }
        }
        if (field.type === "number" && !/^-?\d*(\.\d+)?$/.test(text)) return "Enter numbers only";
        if ((field.key || "").toLowerCase() === "pan" && !/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(text)) return "Please enter a valid PAN, e.g. ABCDE1234F.";
        if (isDateField(field)) {
          const date = new Date(text);
          if (Number.isNaN(date.getTime())) return "Please enter a valid date.";
          const today = new Date();
          today.setHours(23, 59, 59, 999);
          if (!isFutureAllowedDate(field) && date > today) return "Future dates are not allowed here.";
          if (isDobField(field)) {
            const age = ageFromDate(text);
            if (age == null || age < 18) return "Doctor must be at least 18 years old.";
            if (age > 100) return "Please check the date of birth.";
          }
        }
        const options = getFieldOptions(field, context);
        if (field.type === "select" && field.key !== "primary_hospital_institution" && options.length && !options.includes(text)) return "Choose from the list";
        return "";
      }

      function validateSection(section) {
        const next = {};
        const value = state.sections[section.id];
        if (section.kind === "welcome") {
          if (value.consent !== "I Consent") next[section.id + ".consent"] = "Consent is required";
          if (!value.confirmationName) next[section.id + ".confirmationName"] = "Name is required";
        }
        if (section.kind === "additional_services") {
          if (!state.wantsAdditional) next[section.id + ".gate"] = "Choose Yes or No";
          if (state.wantsAdditional === "Yes" && !Object.values(state.selectedServices).some(Boolean)) next[section.id + ".services"] = "Choose at least one service or select No";
        }
        if (section.kind === "table") {
          if (isGoalsSection(section)) {
            (normalizeGoalsValue(section, value).rows || []).forEach((row, rowIndex) => {
              if (!rowStarted(row) && rowIndex > 0) return;
              if (!planningAreasFromRow(row).length && !planFromLegacyRow(row)) next[section.id + ".rows." + rowIndex + ".planning_areas"] = "Please select at least one planning area.";
              (section.fields || []).filter((field) => !["goal_category", "specific_goal"].includes(field.key)).forEach((field) => {
                const message = validateValue(field, row[field.key], row);
                if (message) next[section.id + ".rows." + rowIndex + "." + field.key] = message;
              });
            });
            errors = next;
            return !Object.keys(next).length;
          }
          (value.rows || []).forEach((row, rowIndex) => {
            if (!rowApplicable(section, row)) return;
            if (!rowStarted(row) && rowIndex > 0) return;
            (section.fields || []).forEach((field) => {
              const message = validateValue(field, row[field.key], row);
              if (message) next[section.id + ".rows." + rowIndex + "." + field.key] = message;
            });
          });
        }
        if (section.kind === "matrix") {
          Object.entries(value.columns || {}).forEach(([columnKey, values]) => {
            (section.fields || []).forEach((field) => {
              if (field.type === "heading") return;
              const message = validateValue(field, values[field.key], values);
              if (message) next[section.id + ".columns." + columnKey + "." + field.key] = message;
            });
          });
        }
        if (section.kind === "questionnaire") {
          (section.fields || []).forEach((field) => {
            if (field.type === "heading") return;
            const message = validateValue(field, value[field.key], value);
            if (message) next[section.id + "." + field.key] = message;
          });
        }
        errors = next;
        return Object.keys(next).length === 0;
      }

      function setSectionValue(sectionId, nextValue) {
        state.sections[sectionId] = nextValue;
        queueSave();
        render();
      }

      function renderLanding() {
        app.innerHTML = `
          <main class="landing">
            <section class="hero">
              <div class="brand">
                <div class="brand-mark">DW</div>
                <div><strong>DocWealth</strong><span>Confidential doctor onboarding</span></div>
              </div>
              <div class="hero-copy">
                <p class="eyebrow">Premium Information Portal</p>
                <h1>Welcome, Doctor.</h1>
                <p>A calm, editable single-file portal generated from the DocWealth master workbook. Your progress saves in this browser as you go.</p>
                <div class="pill-row">
                  <div class="pill">Autosave enabled</div>
                  <div class="pill">30-40 minute estimate</div>
                  <div class="pill">Private planning use</div>
                </div>
                <div class="video-box"><div class="video-icon">${VIDEO_ICON_SVG}</div><div><strong>Overview video</strong><br><span class="muted">Coming soon. Placement preserved from Excel.</span></div></div>
              </div>
              <div class="choice-row">
                <button class="primary" data-action="start">Start</button>
                ${hasSavedDraft() ? `<button class="secondary" data-action="resume">Resume saved draft</button>` : ""}
              </div>
            </section>
          </main>
        `;
      }

      function renderNav() {
        const sections = visibleSections();
        const progress = overallProgress();
        return `
          <aside class="sidebar">
            <div class="brand"><div class="brand-mark">DW</div><div><strong>DocWealth</strong><span>Doctor Portal</span></div></div>
            <div class="progress-card"><div class="progress-top"><span>Progress</span><span>${progress}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div>
            <nav class="nav-list">
              ${sections.map((section) => { const status = sectionStatus(section); return `<button class="nav-item ${section.id === state.currentSectionId ? "active" : ""} ${status.className}" data-nav="${section.id}"><span class="status-dot">${status.mark}</span><span class="nav-text"><span>${escapeHtml(section.title)}</span><span class="nav-status">${status.label}</span></span></button>`; }).join("")}
              <button class="nav-item ${state.currentSectionId === "review" ? "active" : ""}" data-nav="review"><span class="status-dot">&#10003;</span><span>Review Your Information</span></button>
            </nav>
          </aside>
        `;
      }

      function renderHeader(section) {
        const sections = visibleSections();
        const step = section ? sections.findIndex((item) => item.id === section.id) + 1 : sections.length;
        const firstName = doctorFirstName();
        return `
          <header class="topbar">
            <button class="menu-button" data-action="menu">Menu</button>
            <div>
              <div class="portal-title">DocWealth Doctor Information Portal</div>
              <div class="portal-subtitle">Confidential Wealth Planning Information</div>
              ${firstName ? `<div class="doctor-welcome">Welcome, Dr. ${escapeHtml(firstName)}</div>` : ""}
              <div class="source">${section ? escapeHtml(section.sourceSheet) : "Review Your Information"}</div>
              <h2>${section ? escapeHtml(section.title) : "Review Your Information"}</h2>
              <div class="step-label">Step ${step} of ${sections.length}</div>
              <div class="trust-row"><span class="trust-pill">Securely protected</span><span class="trust-pill">20-25 minutes</span><span class="trust-pill">Save and continue later</span></div>
            </div>
            <div class="saved"><div>Changes saved</div><div>Last Saved: <span data-last-saved>${formatDate(state.lastSavedAt)}</span></div></div>
          </header>
        `;
      }

      function renderHeaderOnly() {
        const saved = document.querySelector("[data-last-saved]");
        if (saved) saved.textContent = formatDate(state.lastSavedAt);
      }

      function renderIntro(section) {
        const lines = (section.intro || []).slice(0, 4).map((item) => `<p>${escapeHtml(item.text)}</p>`).join("");
        const video = section.video ? `<div class="video-box"><div class="video-icon">${VIDEO_ICON_SVG}</div><div><strong>${section.id === "welcome" ? "Overview video" : "Additional services video"}</strong><br><span class="muted">Coming soon. Placement preserved from Excel.</span></div></div>` : "";
        return `<section class="panel intro">${lines}${video}</section>`;
      }

      function fieldHtml(field, value, error, path, sectionId, context) {
        if (field.type === "heading") return `<div class="heading-row">${escapeHtml(field.label)}</div>`;
        if (!fieldApplicable(field, context || {})) return "";
        const full = field.type === "textarea" ? " full" : "";
        const label = `<span class="label-text">${escapeHtml(field.label)}${fieldRequired(field) ? " *" : ""}</span>${field.helperText ? `<span class="help">${escapeHtml(field.helperText)}</span>` : ""}`;
        let control = "";
        const invalidClass = error ? " invalid-field" : "";
        const errorAttr = error ? " data-error='true'" : "";
        const options = getFieldOptions(field, context);
        if (field.type === "select") {
          if (field.key === "primary_hospital_institution" || field.key === "co_borrower_guarantor") {
            const listId = "dl-" + path.replace(/[^a-zA-Z0-9]/g, "-");
            const typeAheadPlaceholder = field.key === "co_borrower_guarantor"
              ? ""
              : "Pick from the list or type your hospital name";
            const inputAndList = `<input class="${invalidClass.trim()}"${errorAttr} type="text" list="${listId}" value="${escapeHtml(value || "")}" data-path="${path}" data-field-type="text" data-required-field="${fieldRequired(field) ? "true" : "false"}" placeholder="${typeAheadPlaceholder}"><datalist id="${listId}">${options.map((option) => `<option value="${escapeHtml(option)}"></option>`).join("")}</datalist>`;
            if (field.key === "co_borrower_guarantor") {
              control = `<div class="type-or-pick-wrapper">${inputAndList}<span class="type-or-pick-chevron" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></div>`;
            } else {
              control = inputAndList;
            }
          } else {
            control = `<select class="${invalidClass.trim()}"${errorAttr} data-path="${path}" data-required-field="${fieldRequired(field) ? "true" : "false"}"><option value="">Select</option>${options.map((option) => `<option value="${escapeHtml(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select>`;
          }
        } else if (field.type === "textarea") {
          control = `<textarea class="${invalidClass.trim()}"${errorAttr} data-path="${path}" data-required-field="${fieldRequired(field) ? "true" : "false"}">${escapeHtml(value || "")}</textarea>`;
        } else if (field.type === "file") {
          const files = (value && value.files) || [];
          control = `<div class="upload-control${invalidClass}"${errorAttr} data-drop-path="${path}">
            <div class="help"><strong>Secure Document Vault</strong></div>
            <div class="help">Securely upload supporting documents or drag and drop files here.</div>
            <div class="help">Upload supporting documents instead of manually entering repetitive details wherever applicable.</div>
            <div class="help">Allowed formats: PDF, JPG, JPEG, PNG, WEBP, DOC, DOCX, XLS, XLSX, CSV. Maximum size: 20 MB per file.</div>
            <label class="secondary">Upload<input hidden type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx,.xls,.xlsx,.csv" data-file-path="${path}" data-section="${sectionId}" data-field="${field.key}"></label>
            ${files.length ? `<button type="button" class="ghost" data-clear-files="${path}">Replace uploads</button>` : ""}
            ${field.acceptsPassword ? `<input placeholder="Document password, if any" value="${escapeHtml((value && value.password) || "")}" data-upload-password="${path}" data-required-field="false">` : ""}
            <div class="upload-list">${files.map((file, index) => `<div class="upload-item"><span>${escapeHtml(file.name)} (${Math.round((file.size || 0) / 1024)} KB)</span><span class="choice-row"><button class="ghost" data-preview-file="${path}" data-file-index="${index}">Preview</button><button class="ghost" data-remove-file="${path}" data-file-index="${index}">Delete</button></span></div>`).join("")}</div>
          </div>`;
        } else {
          const type = field.type === "number" ? "text" : field.type === "date" ? "date" : field.type === "email" ? "email" : field.type === "tel" ? "tel" : "text";
          const inputMode = field.type === "number" ? "decimal" : field.type === "tel" ? "tel" : field.type === "email" ? "email" : "";
          const max = isDobField(field) ? ` max="${new Date().toISOString().slice(0, 10)}"` : "";
          const extra = `${inputMode ? ` inputmode="${inputMode}"` : ""}${field.type === "email" ? " autocapitalize='none' spellcheck='false'" : ""}${field.type === "number" ? " pattern='^-?[0-9]*[.]?[0-9]*$'" : ""}${max}`;
          control = `<input class="${invalidClass.trim()}"${errorAttr} type="${type}" value="${escapeHtml(value || "")}" data-path="${path}" data-field-type="${field.type}" data-required-field="${fieldRequired(field) ? "true" : "false"}"${extra}>`;
        }
        return `<label class="${full}">${label}${control}${error ? `<span class="error-text">${escapeHtml(error)}</span>` : ""}</label>`;
      }

      function renderWelcome(section) {
        const value = state.sections[section.id];
        return `<section class="panel"><div class="field-grid">
          ${fieldHtml({ key: "consent", label: section.consent.label || "Consent", type: "select", required: true, options: ["I Consent", "I Do Not Consent"] }, value.consent, errors[section.id + ".consent"], section.id + ".consent", section.id, value)}
          ${fieldHtml({ key: "confirmationName", label: section.consent.nameLabel || "Full name", type: "text", required: true }, value.confirmationName, errors[section.id + ".confirmationName"], section.id + ".confirmationName", section.id, value)}
          ${fieldHtml({ key: "confirmationDate", label: section.consent.dateLabel || "Date", type: "date" }, value.confirmationDate, "", section.id + ".confirmationDate", section.id, value)}
        </div></section>`;
      }

      function renderTable(section) {
        if (isGoalsSection(section)) return renderGoalsSection(section);
        const value = state.sections[section.id];
        return `<div class="card-stack">${(value.rows || []).map((row, rowIndex) => rowApplicable(section, row) ? `
          <section class="panel">
            <div class="card-title"><h3>${escapeHtml(section.title)} card ${rowIndex + 1}</h3>${value.rows.length > 1 ? `<button class="ghost" data-remove-row="${section.id}" data-row-index="${rowIndex}">Remove</button>` : ""}</div>
            <div class="field-grid">${(section.fields || []).map((field) => fieldHtml(field, row[field.key], errors[section.id + ".rows." + rowIndex + "." + field.key], section.id + ".rows." + rowIndex + "." + field.key, section.id, row)).join("")}</div>
          </section>` : "").join("")}
          <button class="secondary" data-add-row="${section.id}">Add ${escapeHtml(section.title)} card</button>
        </div>`;
      }

      function renderPlanningAreasField(row, rowIndex) {
        const selected = planningAreasFromRow(row);
        const visible = selected.slice(0, 2);
        const extra = selected.length - visible.length;
        const chips = selected.length ? visible.map((plan) => `<span class="goal-chip">${escapeHtml(plan)}</span>`).join("") + (extra > 0 ? `<span class="goal-chip">+${extra} more</span>` : "") : `<span class="placeholder">Select planning areas</span>`;
        return `<label class="planning-select"><span class="label-text">Planning Areas *</span><details data-plan-details="${rowIndex}"><summary>${chips}</summary><div class="planning-menu"><input type="search" data-plan-search placeholder="Search planning areas"><div class="planning-menu-grid">${QUICK_GOAL_GROUPS.map((group) => `<div class="planning-group"><p>${escapeHtml(group.title)}</p>${group.options.map((plan) => `<button type="button" class="planning-option ${selected.includes(plan) ? "selected" : ""}" data-plan-option="${rowIndex}" data-plan="${escapeHtml(plan)}"><span class="goal-check">${selected.includes(plan) ? "&#10003;" : ""}</span><span>${escapeHtml(plan)}</span></button>`).join("")}</div>`).join("")}</div><div class="planning-actions"><button type="button" class="secondary" data-plan-cancel="${rowIndex}">Cancel</button><button type="button" class="primary" data-plan-done="${rowIndex}">Done</button></div></div></details>${errors["goals.rows." + rowIndex + ".planning_areas"] ? `<span class="error-text">${escapeHtml(errors["goals.rows." + rowIndex + ".planning_areas"])}</span>` : ""}</label>`;
      }

      function renderGoalsSection(section) {
        const value = normalizeGoalsValue(section, state.sections[section.id]);
        return `<div class="card-stack">
          ${(value.rows || []).map((row, rowIndex) => rowApplicable(section, row) ? `
            <section class="panel">
              <div class="card-title"><h3>${escapeHtml(section.title)} card ${rowIndex + 1}</h3>${value.rows.length > 1 ? `<button class="ghost" data-remove-row="${section.id}" data-row-index="${rowIndex}">Remove</button>` : ""}</div>
              <div class="field-grid">${(section.fields || []).filter((field) => !["goal_category", "specific_goal"].includes(field.key)).map((field) => fieldHtml(field, row[field.key], errors[section.id + ".rows." + rowIndex + "." + field.key], section.id + ".rows." + rowIndex + "." + field.key, section.id, row) + (field.key === "for_owner" ? renderPlanningAreasField(row, rowIndex) : "")).join("")}</div>
            </section>` : "").join("")}
          <button class="secondary" data-add-row="${section.id}">Add ${escapeHtml(section.title)} card</button>
        </div>`;
      }

      function renderMatrix(section) {
        const value = state.sections[section.id];
        return `<div class="matrix-grid">${(section.columns || []).filter((column) => matrixColumnVisible(section, column.key)).map((column) => `
          <section class="panel">
            <div class="card-title"><h3>${escapeHtml(column.label)}</h3></div>
            <div class="card-stack">${(section.fields || []).map((field) => field.type === "heading" ? fieldHtml(field) : fieldHtml(field, value.columns[column.key][field.key], errors[section.id + ".columns." + column.key + "." + field.key], section.id + ".columns." + column.key + "." + field.key, section.id, value.columns[column.key])).join("")}</div>
          </section>`).join("")}</div>`;
      }

      function renderQuestionnaire(section) {
        const value = state.sections[section.id];
        return `<section class="panel"><div class="field-grid">${(section.fields || []).map((field) => fieldHtml(field, value[field.key], errors[section.id + "." + field.key], section.id + "." + field.key, section.id, value)).join("")}</div></section>`;
      }

      function renderAdditional(section) {
        return `<div class="card-stack">
          <section class="panel">
            <h3>Would you like assistance with any of our additional services?</h3>
            <div class="choice-row" style="margin-top:14px">
              <button class="secondary ${state.wantsAdditional === "Yes" ? "selected" : ""}" data-wants="Yes">Yes</button>
              <button class="secondary ${state.wantsAdditional === "No" ? "selected" : ""}" data-wants="No">No</button>
            </div>
            ${errors[section.id + ".gate"] ? `<span class="error-text">${errors[section.id + ".gate"]}</span>` : ""}
          </section>
          ${state.wantsAdditional === "Yes" ? `<section class="service-grid">${(section.services || []).map((service) => `<button class="service-card ${state.selectedServices[service.id] ? "selected" : ""}" data-service="${service.id}"><h3>${escapeHtml(service.title)}</h3><p class="muted">${escapeHtml(service.description)}</p></button>`).join("")}</section>` : ""}
          ${errors[section.id + ".services"] ? `<span class="error-text">${errors[section.id + ".services"]}</span>` : ""}
        </div>`;
      }

      function displayValue(value) {
        if (value == null || value === "") return "";
        if (typeof value === "object" && "files" in value) {
          const fileNames = (value.files || []).map((file) => file.name).join(", ");
          return fileNames || (value.password ? "Password provided" : "");
        }
        return String(value);
      }

      function sanitizedRows(fields, values) {
        const output = {};
        (fields || []).forEach((field) => {
          if (field.type === "heading" || !fieldApplicable(field, values || {})) return;
          const value = displayValue(values[field.key]);
          if (value) output[field.key] = value;
        });
        return output;
      }

      function sanitizedSection(section) {
        const value = state.sections[section.id];
        if (section.kind === "welcome") return { consent: value.consent, confirmationName: value.confirmationName, confirmationDate: value.confirmationDate };
        if (section.kind === "additional_services") {
          const selected = (section.services || []).filter((service) => state.selectedServices[service.id]).map((service) => service.title);
          return { wantsAdditional: state.wantsAdditional, selectedServices: selected };
        }
        if (section.kind === "table") {
          if (isGoalsSection(section)) {
            return { rows: (normalizeGoalsValue(section, value).rows || []).filter((row, index) => (index === 0 || rowStarted(row)) && rowApplicable(section, row)).map((row) => {
              const output = { planning_areas: planningAreasFromRow(row) };
              Object.assign(output, sanitizedRows((section.fields || []).filter((field) => !["goal_category", "specific_goal"].includes(field.key)), row));
              return output;
            }).filter((row) => Object.keys(row).length) };
          }
          return { rows: (value.rows || []).filter((row) => rowStarted(row) && rowApplicable(section, row)).map((row) => sanitizedRows(section.fields, row)).filter((row) => Object.keys(row).length) };
        }
        if (section.kind === "matrix") {
          const columns = {};
          (section.columns || []).forEach((column) => {
            const rows = sanitizedRows(section.fields, (value.columns || {})[column.key] || {});
            if (Object.keys(rows).length) columns[column.key] = rows;
          });
          return { columns };
        }
        return sanitizedRows(section.fields, value || {});
      }

      function reviewRows(fields, values) {
        return (fields || [])
          .filter((field) => field.type !== "heading" && fieldApplicable(field, values || {}))
          .map((field) => {
            const value = displayValue(values[field.key]);
            if (!value) return "";
            return `<div class="review-row"><div class="review-label">${escapeHtml(field.label)}</div><div class="review-value">${escapeHtml(value)}</div></div>`;
          })
          .filter(Boolean)
          .join("");
      }

      function renderReviewSection(section) {
        const value = state.sections[section.id];
        if (section.kind === "welcome") {
          return `<div class="review-grid">
            <div class="review-row"><div class="review-label">Consent</div><div class="review-value">${escapeHtml(value.consent || "Not provided")}</div></div>
            <div class="review-row"><div class="review-label">Confirmed by</div><div class="review-value">${escapeHtml(value.confirmationName || "Not provided")}</div></div>
          </div>`;
        }
        if (section.kind === "additional_services") {
          const selected = (section.services || []).filter((service) => state.selectedServices[service.id]).map((service) => service.title);
          return `<div class="review-grid">
            <div class="review-row"><div class="review-label">Needs additional services?</div><div class="review-value">${escapeHtml(state.wantsAdditional || "Not answered")}</div></div>
            <div class="review-row"><div class="review-label">Selected services</div><div class="review-value">${escapeHtml(selected.join(", ") || "None")}</div></div>
          </div>`;
        }
        if (section.kind === "table") {
          if (isGoalsSection(section)) {
            const cards = (normalizeGoalsValue(section, value).rows || []).filter((row, index) => (index === 0 || rowStarted(row)) && rowApplicable(section, row)).map((row, index) => {
              const visibleFields = (section.fields || []).filter((field) => !["goal_category", "specific_goal"].includes(field.key));
              const planningAreas = planningAreasFromRow(row).map((plan) => `<span class="nav-status">${escapeHtml(plan)}</span>`).join(" ");
              const rows = `<div class="review-row"><div class="review-label">Planning Areas</div><div class="review-value">${planningAreas}</div></div>` + reviewRows(visibleFields, row);
              return rows ? `<div class="review-card"><strong>Card ${index + 1}</strong><div class="review-grid">${rows}</div></div>` : "";
            }).filter(Boolean).join("");
            return cards || `<p class="review-empty">No responses requiring review.</p>`;
          }
          const cards = (value.rows || []).filter((row) => rowStarted(row) && rowApplicable(section, row)).map((row, index) => {
            const rows = reviewRows(section.fields, row);
            return rows ? `<div class="review-card"><strong>Card ${index + 1}</strong><div class="review-grid">${rows}</div></div>` : "";
          }).filter(Boolean).join("");
          return cards || `<p class="review-empty">No responses requiring review.</p>`;
        }
        if (section.kind === "matrix") {
          const cards = (section.columns || []).map((column) => {
            const values = value.columns[column.key] || {};
            const rows = reviewRows(section.fields, values);
            return rows ? `<div class="review-card"><strong>${escapeHtml(column.label)}</strong><div class="review-grid">${rows}</div></div>` : "";
          }).filter(Boolean).join("");
          return cards || `<p class="review-empty">No responses requiring review.</p>`;
        }
        const rows = reviewRows(section.fields, value);
        return rows ? `<div class="review-grid">${rows}</div>` : `<p class="review-empty">No responses requiring review.</p>`;
      }

      function renderSection(section) {
        let body = renderIntro(section);
        const hasRequired = (section.fields || []).some(fieldRequired) || section.kind === "welcome" || section.kind === "additional_services";
        if (hasRequired) body += `<div class="mandatory-legend">Fields marked <strong>*</strong> are mandatory.</div>`;
        if (section.kind === "welcome") body += renderWelcome(section);
        if (section.kind === "table") body += renderTable(section);
        if (section.kind === "matrix") body += renderMatrix(section);
        if (section.kind === "questionnaire") body += renderQuestionnaire(section);
        if (section.kind === "additional_services") body += renderAdditional(section);
        if (section.footerNotes && section.footerNotes.length) body += `<section class="panel intro">${section.footerNotes.map((note) => `<p>${escapeHtml(note.text)}</p>`).join("")}</section>`;
        return body;
      }

      function renderReview() {
        const sections = reviewSections();
        return `<div class="content-inner">
          <section class="panel intro"><p class="eyebrow">Executive Summary</p><p>Review the meaningful information shared across your DocWealth onboarding before final submission.</p></section>
          ${errors.review ? `<section class="panel"><span class="error-text">${escapeHtml(errors.review)}</span></section>` : ""}
          ${sections.map((section) => `<details class="panel"><summary><span>${escapeHtml(section.title)} <span class="nav-status">Completed</span></span><button class="ghost" data-nav="${section.id}">Edit</button></summary>${renderReviewSection(section)}</details>`).join("")}
          <section class="panel">
            <p class="muted">I confirm that the information provided above is true and accurate to the best of my knowledge. I understand that after submission, this form will be locked and further changes cannot be made through the portal.</p>
            <label style="margin-top:12px"><input type="checkbox" data-declaration ${state.declarationConfirmed ? "checked" : ""}> I Agree</label>
            <div style="margin-top:18px"><button class="primary" data-action="submit" ${state.declarationConfirmed ? "" : "disabled"}>FINAL SUBMIT</button></div>
          </section>
        </div>`;
      }

      function renderSuccess() {
        app.innerHTML = `<main class="success"><section class="panel success-card"><div class="brand-mark" style="margin:0 auto 20px">&#10003;</div><h1>Submission Successful</h1><p>Reference Number: <strong>${escapeHtml(state.confirmationNumber)}</strong></p><p class="muted">Thank you. DocWealth will review your information and follow up with the next steps. This submitted portal is now locked.</p><div class="summary-actions"><button class="primary" data-action="close">Close Portal</button></div></section></main>`;
      }

      function renderApp() {
        const section = currentSection();
        app.innerHTML = `<main class="shell">${renderNav()}<section class="main">${renderHeader(state.currentSectionId === "review" ? null : section)}<div class="content">${state.currentSectionId === "review" ? renderReview() : `<div class="content-inner">${renderSection(section)}</div>`}</div>${state.currentSectionId === "review" ? "" : renderFooter()}</section></main>`;
      }

      function renderFooter() {
        const sections = visibleSections();
        const index = sections.findIndex((section) => section.id === currentSection().id);
        return `<footer class="footer"><button class="secondary" data-action="previous" ${index === 0 ? "disabled" : ""}>Back</button><button class="secondary" data-action="save">Save Draft</button><button class="primary" data-action="next">Save & Continue</button></footer>`;
      }

      function render() {
        if (state.submittedAt) return renderSuccess();
        if (!state.started) return renderLanding();
        renderApp();
        bind();
      applyPortalStatusOnLoad();
      }

      function getPath(path) {
        return path.split(".").reduce((cursor, key) => cursor && cursor[key], state.sections);
      }

      function setPath(path, value) {
        const parts = path.split(".");
        let cursor = state.sections;
        parts.slice(0, -1).forEach((part) => cursor = cursor[part]);
        cursor[parts[parts.length - 1]] = value;
      }

      function contextForPath(path) {
        const parts = path.split(".");
        const section = WORKBOOK_SCHEMA.sections.find((item) => item.id === parts[0]);
        if (!section) return {};
        if (section.kind === "table") return ((state.sections[section.id].rows || [])[Number(parts[2])] || {});
        if (section.kind === "matrix") return (((state.sections[section.id].columns || {})[parts[2]]) || {});
        return state.sections[section.id] || {};
      }

      function validatePath(path) {
        const field = findFieldByPath(path);
        const context = contextForPath(path);
        const message = validateValue(field, getPath(path), context);
        if (message) errors[path] = message;
        else delete errors[path];
        return message;
      }

      function addAcceptedFiles(path, fileList) {
        const current = getPath(path) || { files: [], password: "" };
        const accepted = [];
        const rejected = [];
        Array.from(fileList || []).forEach((file) => {
          const ext = (file.name.split(".").pop() || "").toLowerCase();
          if (!ALLOWED_UPLOAD_TYPES.includes(ext)) rejected.push(file.name + " has an unsupported file type.");
          else if (file.size > MAX_UPLOAD_SIZE) rejected.push(file.name + " is larger than 20 MB.");
          else accepted.push(file);
        });
        if (rejected.length) alert(rejected.join("\n"));
        const files = accepted.map((file) => ({ id: file.name + "-" + file.size + "-" + Date.now() + "-" + Math.random().toString(16).slice(2), name: file.name, size: file.size, type: file.type || "Unknown", addedAt: new Date().toISOString(), status: "Uploaded" }));
        setPath(path, { ...current, files: current.files.concat(files) });
      }

      function completeAndNext() {
        const section = currentSection();
        if (!validateSection(section)) {
          render();
          focusFirstError();
          return;
        }
        if (!state.completed.includes(section.id)) state.completed.push(section.id);
        const sections = visibleSections();
        const index = sections.findIndex((item) => item.id === section.id);
        state.currentSectionId = sections[index + 1] ? sections[index + 1].id : "review";
        saveNow();
        render();
        scrollToTop();
      }

      async function checkPortalStatus() {
        if (!PORTAL_CLIENT_ID || !PORTAL_TOKEN) return { ok: true, status: "Open" };
        try {
          const response = await fetch("https://docwealth-backend.onrender.com/api/portal-status?clientId=" + encodeURIComponent(PORTAL_CLIENT_ID) + "&token=" + encodeURIComponent(PORTAL_TOKEN));
          return await response.json();
        } catch {
          return { ok: true, status: "Open" };
        }
      }

      async function applyPortalStatusOnLoad() {
        const status = await checkPortalStatus();
        if (!status) return;
        const serverSubmitted = status.status === "Submitted" || status.status === "Locked";
        if (status.status === "Needs Correction" && state.submittedAt) {
          state.submittedAt = "";
          state.currentSectionId = "review";
          saveNow();
          render();
          return;
        }
        if (serverSubmitted) {
          state.submittedAt = state.submittedAt || (status.portal && status.portal.submittedAt) || new Date().toISOString();
          state.confirmationNumber = state.confirmationNumber || PORTAL_CLIENT_ID || state.clientId || "Submitted";
          state.currentSectionId = "submitted";
          saveNow();
          render();
          return;
        }
        if (!serverSubmitted && state.submittedAt) {
          state.submittedAt = "";
          state.confirmationNumber = "";
          if (state.currentSectionId === "submitted") state.currentSectionId = WORKBOOK_SCHEMA.sections[0].id;
          saveNow();
          render();
        }
      }
      async function submit() {
        if (state.submittedAt) return;
        const aggregateErrors = {};
        const failures = [];
        visibleSections().forEach((section) => {
          if (!validateSection(section)) {
            failures.push(section.title);
            Object.assign(aggregateErrors, errors);
          }
        });
        errors = aggregateErrors;
        if (failures.length || !state.declarationConfirmed) {
          errors.review = failures.length ? "Please complete: " + failures.join(", ") : "Please confirm the declaration";
          state.currentSectionId = "review";
          render();
          focusFirstError();
          return;
        }
        const portalStatus = await checkPortalStatus();
        if (portalStatus && (portalStatus.status === "Submitted" || portalStatus.status === "Locked")) {
          errors.review = "Portal already submitted. Please contact DocWealth if corrections are required.";
          state.currentSectionId = "review";
          render();
          return;
        }
        state.submittedAt = new Date().toISOString();
state.confirmationNumber = PORTAL_CLIENT_ID || ("DW-" + Date.now());
state.clientId = PORTAL_CLIENT_ID || state.clientId || state.confirmationNumber;
state.portalToken = PORTAL_TOKEN || state.portalToken || "";

try {
  const response = await fetch("https://docwealth-backend.onrender.com/api/portal-submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      clientId: PORTAL_CLIENT_ID || state.clientId || state.confirmationNumber,
      portalToken: PORTAL_TOKEN || state.portalToken || "",
      submittedAt: state.submittedAt,
      portalData: state,
    }),
  });

  const result = await response.json();

  if (!response.ok || !result.ok) {
    throw new Error(result.error || "Zoho submit failed");
  }

  state.currentSectionId = "submitted";
  saveNow();
  render();
} catch (error) {
  state.submittedAt = "";
  state.confirmationNumber = "";
  errors.review = "Could not submit to DocWealth. Please contact DocWealth.";
  state.currentSectionId = "review";
  render();
}
      }

      function downloadSummary() {
        const payload = {
          appName: WORKBOOK_SCHEMA.appName,
          referenceNumber: state.confirmationNumber,
          submittedAt: state.submittedAt,
          sections: reviewSections().map((section) => ({ title: section.title, sourceSheet: section.sourceSheet, responses: sanitizedSection(section) }))
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = (state.confirmationNumber || "docwealth-summary") + ".json";
        link.click();
        URL.revokeObjectURL(url);
      }

      function bind() {
        document.querySelectorAll("[data-action]").forEach((element) => element.addEventListener("click", (event) => { event.preventDefault();
          const action = element.dataset.action;
          if (action === "start") {
            const savedRaw = localStorage.getItem(STORAGE_KEY);
            let hasData = false;
            if (savedRaw) {
              try {
                const savedState = JSON.parse(savedRaw);
                hasData = Boolean(savedState.started || savedState.submittedAt || savedState.lastSavedAt);
              } catch { hasData = true; }
            }
            if (hasData && !window.confirm("This will erase the information already saved in this portal and start over. Your previous answers cannot be recovered. To keep your saved answers, choose Cancel and then use \"Resume saved draft\".\n\nAre you sure you want to start over?")) {
              return;
            }
            localStorage.removeItem(STORAGE_KEY);
            state = initialState();
            state.started = true;
            saveNow(); render(); scrollToTop();
          }
          if (action === "resume") {
            state = loadState();
            state.started = true;
            saveNow(); render(); scrollToTop();
          }
          if (action === "menu") document.body.classList.toggle("menu-open");
          if (action === "save") { saveNow(); showToast("Progress Saved"); }
          if (action === "previous") {
            const sections = visibleSections();
            const index = sections.findIndex((item) => item.id === currentSection().id);
            state.currentSectionId = sections[Math.max(index - 1, 0)].id;
            saveNow(); render(); scrollToTop();
          }
          if (action === "next") completeAndNext();
          if (action === "submit") submit();
          if (action === "download-summary") downloadSummary();
          if (action === "close") window.close();
        }));
        document.querySelectorAll('[data-action="next"], [data-action="save"], [data-action="previous"], [data-action="submit"]').forEach((element) => element.addEventListener("mousedown", (event) => event.preventDefault()));
        document.querySelectorAll("[data-nav]").forEach((element) => element.addEventListener("click", (event) => {
          event.preventDefault();
          state.currentSectionId = element.dataset.nav;
          document.body.classList.remove("menu-open");
          saveNow(); render(); scrollToTop();
        }));
        document.querySelectorAll("[data-plan-option]").forEach((element) => element.addEventListener("click", () => {
          element.classList.toggle("selected");
          const check = element.querySelector(".goal-check");
          if (check) check.innerHTML = element.classList.contains("selected") ? "&#10003;" : "";
        }));
        document.querySelectorAll("[data-plan-cancel]").forEach((element) => element.addEventListener("click", () => {
          const details = document.querySelector(`[data-plan-details="${element.dataset.planCancel}"]`);
          if (details) details.removeAttribute("open");
          render();
        }));
        document.querySelectorAll("[data-plan-done]").forEach((element) => element.addEventListener("click", () => {
          const section = WORKBOOK_SCHEMA.sections.find((item) => item.id === "goals");
          const value = normalizeGoalsValue(section, state.sections.goals);
          const rowIndex = Number(element.dataset.planDone);
          const details = document.querySelector(`[data-plan-details="${rowIndex}"]`);
          const planning_areas = details ? Array.from(details.querySelectorAll("[data-plan-option].selected")).map((option) => option.dataset.plan) : [];
          value.rows[rowIndex] = { ...value.rows[rowIndex], planning_areas, ...hiddenGoalFieldsForPlans(planning_areas) };
          state.sections.goals = value;
          saveNow(); render();
        }));
        document.querySelectorAll("[data-plan-search]").forEach((element) => element.addEventListener("input", () => {
          const query = element.value.toLowerCase();
          element.closest(".planning-menu").querySelectorAll("[data-plan-option]").forEach((option) => {
            option.style.display = option.dataset.plan.toLowerCase().includes(query) ? "" : "none";
          });
        }));
        document.querySelectorAll('[data-plan-option], [data-plan-done], [data-plan-cancel], [data-plan-details] > summary').forEach((element) => element.addEventListener("mousedown", (event) => event.preventDefault()));
        document.querySelectorAll("[data-path]").forEach((element) => {
          const eventName = element.tagName === "SELECT" ? "change" : "input";
          element.addEventListener(eventName, () => {
            const field = findFieldByPath(element.dataset.path);
            const normalized = normalizeInputValue(field, element.value);
            if (element.value !== normalized) element.value = normalized;
            setPath(element.dataset.path, normalized);
            queueSave();
            if (element.tagName === "SELECT") render();
          });
          element.addEventListener("blur", () => {
            if (keyboardMoving) return;
            validatePath(element.dataset.path);
            render();
          });
          element.addEventListener("keydown", (event) => {
            if (event.key !== "Enter" || event.shiftKey || element.tagName === "TEXTAREA") return;
            event.preventDefault();
            const targetIndex = nextLogicalFieldIndex(element);
            validatePath(element.dataset.path);
            if (errors[element.dataset.path]) { render(); focusFirstError(); return; }
            keyboardMoving = true;
            render();
            setTimeout(() => requestAnimationFrame(() => {
              focusLogicalFieldAtIndex(targetIndex);
              keyboardMoving = false;
            }), 30);
          });
        });
        document.querySelectorAll("[data-file-path]").forEach((element) => element.addEventListener("change", () => {
          addAcceptedFiles(element.dataset.filePath, element.files);
          saveNow(); render(); showToast("Document Uploaded");
        }));
        document.querySelectorAll("[data-drop-path]").forEach((element) => {
          element.addEventListener("dragover", (event) => { event.preventDefault(); element.classList.add("dragging"); });
          element.addEventListener("dragleave", () => element.classList.remove("dragging"));
          element.addEventListener("drop", (event) => {
            event.preventDefault();
            element.classList.remove("dragging");
            addAcceptedFiles(element.dataset.dropPath, event.dataTransfer.files);
            saveNow(); render(); showToast("Document Uploaded");
          });
        });
        document.querySelectorAll("[data-upload-password]").forEach((element) => element.addEventListener("input", () => {
          const current = getPath(element.dataset.uploadPassword) || { files: [], password: "" };
          setPath(element.dataset.uploadPassword, { ...current, password: element.value });
          queueSave();
        }));
        document.querySelectorAll("[data-upload-password]").forEach((element) => element.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" || event.shiftKey) return;
          event.preventDefault();
          const targetIndex = nextLogicalFieldIndex(element);
          keyboardMoving = true;
          render();
          setTimeout(() => requestAnimationFrame(() => {
            focusLogicalFieldAtIndex(targetIndex);
            keyboardMoving = false;
          }), 30);
        }));
        document.querySelectorAll("[data-remove-file]").forEach((element) => element.addEventListener("click", () => {
          const current = getPath(element.dataset.removeFile);
          current.files.splice(Number(element.dataset.fileIndex), 1);
          saveNow(); render();
        }));
        document.querySelectorAll("[data-clear-files]").forEach((element) => element.addEventListener("click", () => {
          const current = getPath(element.dataset.clearFiles) || { files: [], password: "" };
          setPath(element.dataset.clearFiles, { ...current, files: [] });
          saveNow(); render();
        }));
        document.querySelectorAll("[data-preview-file]").forEach((element) => element.addEventListener("click", () => {
          const current = getPath(element.dataset.previewFile);
          const file = current && current.files && current.files[Number(element.dataset.fileIndex)];
          if (file) alert("File: " + file.name + "\nSize: " + Math.round((file.size || 0) / 1024) + " KB\nUploaded: " + formatDate(file.addedAt));
        }));
        document.querySelectorAll("[data-add-row]").forEach((element) => element.addEventListener("click", () => {
          const section = WORKBOOK_SCHEMA.sections.find((item) => item.id === element.dataset.addRow);
          state.sections[section.id].rows.push(isGoalsSection(section) ? emptyGoalRow(section) : Object.fromEntries((section.fields || []).map((field) => [field.key, emptyValue(field)])));
          saveNow(); render();
        }));
        document.querySelectorAll("[data-remove-row]").forEach((element) => element.addEventListener("click", () => {
          state.sections[element.dataset.removeRow].rows.splice(Number(element.dataset.rowIndex), 1);
          saveNow(); render();
        }));
        document.querySelectorAll("[data-wants]").forEach((element) => element.addEventListener("click", () => {
          state.wantsAdditional = element.dataset.wants;
          if (state.wantsAdditional === "No") state.selectedServices = {};
          saveNow(); render(); scrollToTop();
        }));
        document.querySelectorAll("[data-service]").forEach((element) => element.addEventListener("click", () => {
          state.selectedServices[element.dataset.service] = !state.selectedServices[element.dataset.service];
          saveNow(); render();
        }));
        const declaration = document.querySelector("[data-declaration]");
        if (declaration) declaration.addEventListener("change", () => {
          state.declarationConfirmed = declaration.checked;
          saveNow();
        });
      }

      setInterval(() => {
        if (state.started && !state.submittedAt) saveNow();
      }, 120000);
      window.addEventListener("beforeunload", (event) => {
        const shouldWarn = state.started && !state.submittedAt && hasUnsavedChanges;
        saveNow();
        if (shouldWarn) event.returnValue = "";
      });
      state = startupState();
      render();
      bind();
      applyPortalStatusOnLoad();
    </script>
   
  </body>
</html>
